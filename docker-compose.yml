version: '3.8'

services:
  # CLI mode - headless terminal execution
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fp-analyzer-cli
    volumes:
      # Mount output directory for exports
      - ./output:/app/output
    command: >
      python cli_app.py --terminal 
      --mode random 
      --iter 10000 
      --batch 5 
      --export output/results.csv

  # GUI mode - requires X11 display (Linux/WSL2)
  gui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fp-analyzer-gui
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - ./output:/app/output
      # X11 socket for GUI (Linux)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host
    command: python gui_app.py
    profiles:
      - gui

  # Development mode with live code mounting
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fp-analyzer-dev
    volumes:
      - .:/app
      - ./output:/app/output
    stdin_open: true
    tty: true
    command: /bin/bash
    profiles:
      - dev
