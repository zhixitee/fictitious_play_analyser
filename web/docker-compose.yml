# Web Application Docker Compose
#
# Production (browser-only):  docker compose -f web/docker-compose.yml up
# With local server:          docker compose -f web/docker-compose.yml --profile server up
# Development:                docker compose -f web/docker-compose.yml --profile dev up

services:
  # ── Production: static SPA served by nginx ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: fp-web-frontend
    ports:
      - "80:80"
    restart: unless-stopped

  # ── Local simulation server (Node.js) ───────────────────────────────────────
  # Activate with: --profile server
  # The frontend connects to ws://localhost:3001 when "Local Mode" is enabled.
  local-server:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: with-server
    container_name: fp-local-server
    ports:
      - "3001:3001"
    restart: unless-stopped
    profiles:
      - server

  # ── Development: Frontend with hot reload ───────────────────────────────────
  frontend-dev:
    image: node:20-alpine
    container_name: fp-web-frontend-dev
    working_dir: /app
    ports:
      - "8888:8888"
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host --port 8888"
    profiles:
      - dev
